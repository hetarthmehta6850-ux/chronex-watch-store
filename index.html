<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronex Vadodara | Premium Multi-Brand Watch Boutique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png?v=3" />
    <link rel="shortcut icon" href="/favicon.png?v=3" />
    <link rel="apple-touch-icon" href="/favicon.png?v=3" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d4af37" />
    <script>
      // Automatically reload the page when a Vite chunk preload fails (e.g. after a redeploy)
      window.addEventListener('vite:preloadError', (event) => {
        console.warn('Vite preload error detected. Reloading page...');
        window.location.reload();
      });
      // Fallback for general chunk fetch errors
      window.addEventListener('error', (event) => {
        if (event.message && (event.message.includes('dynamically imported module') || event.message.includes('Failed to fetch'))) {
          console.warn('Chunk fetch error detected. Reloading page...');
          window.location.reload();
        }
      }, true);
    </script>
  </head>
  <body class="bg-neutral-950 text-neutral-100 antialiased selection:bg-amber-500/20 selection:text-amber-500">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
